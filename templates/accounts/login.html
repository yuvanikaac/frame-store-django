<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h1>Login</h1>

{% for message in messages %}
    <p>{{ message }}</p>
{% endfor %}

<form method="post">

    {% csrf_token %}

    <p>
        Email:
        <input type="email" name="email">
    </p>

    <p>
        Password:
        <input type="password" name="password">
    </p>

    <button type="submit">
        Login
    </button>

</form>

</body>
</html>
